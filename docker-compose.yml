services:
  db:
    image: mysql:8.0
    container_name: skylark-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skylark_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: skylark-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/skylark_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: skylark-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
